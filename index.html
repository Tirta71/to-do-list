<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Task</title>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="garden-bg">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
    </div>

    <div class="app-container">
      <section class="hero-card">
        <p class="eyebrow">Growing...</p>

        <div class="hero-content">
          <div>
            <h1>Todo List</h1>
          </div>

          <button class="enter-btn" type="button">▶ Kelola Agenda</button>
        </div>
      </section>

      <header class="profile-card">
        <div class="profile-left">
          <div class="avatar-wrap">
            <img
              src="assets/img/my_profile.jpg"
              alt="Profile"
              class="profile-img"
            />
          </div>

          <div>
            <p class="small-label">Profile</p>
            <h2 id="userName">Tirta Samara</h2>
            <p id="userPosition">Full stack Developer</p>
          </div>
        </div>

        <div class="date-box">
          <p class="small-label">Day</p>
          <h3 id="dayText">Senin</h3>
          <p id="dateText">01 Januari 2026</p>
        </div>
      </header>

      <main class="main-grid">
        <section class="form-card">
          <div class="section-header">
            <p class="small-label">New Seed</p>
            <h2>Add Agenda</h2>
          </div>

          <form id="taskForm">
            <div class="form-group">
              <label for="taskInput">Nama Task</label>
              <textarea
                id="taskInput"
                placeholder="Contoh: Membuat laporan harian"
                required
              ></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="priorityInput">Priority</label>
                <select id="priorityInput">
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>
              </div>

              <div class="form-group">
                <label for="dueDateInput">Tanggal</label>
                <input type="date" id="dueDateInput" required />
              </div>
            </div>

            <button type="submit" class="btn-submit">Submit Task</button>
          </form>

          <button id="deleteAllBtn" class="btn-delete-all" type="button">
            Delete All Tasks
          </button>
        </section>

        <section class="dashboard-card">
          <div class="stats-grid">
            <div class="stat-item">
              <p>To Do</p>
              <h3 id="todoCount">0</h3>
            </div>

            <div class="stat-item">
              <p>Done</p>
              <h3 id="doneCount">0</h3>
            </div>

            <div class="stat-item">
              <p>Late</p>
              <h3 id="lateCount">0</h3>
            </div>
          </div>

          <div class="filter-card">
            <label for="filterDateInput">Lihat task berdasarkan tanggal</label>
            <div class="filter-row">
              <input type="date" id="filterDateInput" />
              <button id="resetFilterBtn" type="button">Today</button>
            </div>
          </div>
        </section>
      </main>

      <section class="tasks-grid">
        <div class="list-card">
          <div class="list-header">
            <div>
              <p class="small-label">Growing List</p>
              <h2>To Do</h2>
            </div>
          </div>

          <ul id="todoList" class="task-list"></ul>
        </div>

        <div class="list-card">
          <div class="list-header">
            <div>
              <p class="small-label">Harvested</p>
              <h2>Done</h2>
            </div>
          </div>

          <ul id="doneList" class="task-list"></ul>
        </div>

        <div class="list-card late-card">
          <div class="list-header">
            <div>
              <p class="small-label">Overdue</p>
              <h2>Late</h2>
            </div>
          </div>

          <ul id="lateList" class="task-list"></ul>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/storage.js"></script>
    <script src="js/date.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
